map $http_upgrade $hermes_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name daxueshenmai.top www.daxueshenmai.top;
    return 308 https://daxueshenmai.top$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name daxueshenmai.top www.daxueshenmai.top;

    ssl_certificate /etc/letsencrypt/live/daxueshenmai-top-cert/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daxueshenmai-top-cert/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 256m;
    limit_conn hermes_per_ip 50;
    limit_req zone=hermes_general burst=120 nodelay;
    limit_req zone=hermes_login burst=10 nodelay;
    limit_req zone=hermes_refresh burst=60 nodelay;
    limit_req_status 429;
    limit_conn_status 429;
    access_log /var/log/nginx/daxueshenmai.access.log hermes_privacy;

    error_page 429 = @hermes_json_rate_limited;
    error_page 502 503 504 = @hermes_json_unavailable;

    location @hermes_json_rate_limited {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Retry-After "5" always;
        return 429 '{"error":{"code":"rate_limited","message":"请求过于频繁，请稍后重试。","retryable":true},"status":429}';
    }

    location @hermes_json_unavailable {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Retry-After "3" always;
        return 503 '{"error":{"code":"service_unavailable","message":"Hermes 服务暂时不可用，请稍后重试。","retryable":true},"status":503}';
    }

    location = /_hermes/recovery/dbb3 {
        limit_except POST { deny all; }
        client_max_body_size 64k;
        proxy_pass http://10.66.0.2:9121/recover;
        proxy_http_version 1.1;
        proxy_set_header Host 10.66.0.2:9121;
        proxy_set_header X-DBB3-Token $http_x_dbb3_token;
        proxy_set_header Connection close;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }

    location = /_hermes/recovery/wsl {
        limit_except POST { deny all; }
        client_max_body_size 64k;
        proxy_pass http://127.0.0.1:19122/recover;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:19122;
        proxy_set_header X-DBB3-Token $http_x_dbb3_token;
        proxy_set_header Connection close;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }

    location / {
        proxy_pass http://127.0.0.2:9119;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_intercept_errors on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # The backend binds an alternate loopback address to engage Hermes'
        # auth gate without exposing port 9119 on a public interface.
        proxy_set_header Host 127.0.0.2:9119;
        proxy_set_header Origin "";
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Forwarded "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $hermes_connection_upgrade;
    }

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header X-Frame-Options DENY always;
    add_header X-Permitted-Cross-Domain-Policies none always;
    add_header Cross-Origin-Resource-Policy same-origin always;
    add_header Content-Security-Policy "frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(self), camera=(self), display-capture=(self), encrypted-media=(self), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(self), payment=(), publickey-credentials-get=(self), usb=()" always;
}
