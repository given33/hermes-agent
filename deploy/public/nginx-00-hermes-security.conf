server_tokens off;

log_format hermes_privacy '$remote_addr [$time_iso8601] '
                          '"$request_method $uri $server_protocol" '
                          '$status $body_bytes_sent $request_time';

# Password and registration attempts stay deliberately strict. A mobile token
# refresh has its own bucket so a temporary upstream outage cannot exhaust the
# interactive-login allowance for the same address.
map "$request_method:$uri" $hermes_login_limit_key {
    default "";
    ~^POST:/auth/(password-login|mobile/(token|registration-code|register))$ $binary_remote_addr;
}

map "$request_method:$uri" $hermes_refresh_limit_key {
    default "";
    ~^POST:/auth/mobile/refresh$ $binary_remote_addr;
}

limit_req_zone $binary_remote_addr zone=hermes_general:10m rate=30r/s;
limit_req_zone $hermes_login_limit_key zone=hermes_login:10m rate=10r/m;
limit_req_zone $hermes_refresh_limit_key zone=hermes_refresh:10m rate=60r/m;
limit_conn_zone $binary_remote_addr zone=hermes_per_ip:10m;

client_header_timeout 15s;
client_body_timeout 60s;
reset_timedout_connection on;
